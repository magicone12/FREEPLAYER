<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Player Auto-Loop MP4+MPD 16:9</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.8/shaka-player.compiled.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
}
.playerWrap{
  padding:10px;
  display:flex;
  justify-content:center;
}
.videoContainer{
  width:95%;
  max-width:900px;
  position: relative;
  padding-top: 56.25%; /* 16:9 aspect ratio */
  background:black;
}
video{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:contain; /* fit video inside container */
  background:black;
}
.channels{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
  justify-content:center;
}
.channelBtn{
  width:140px;
  cursor:pointer;
  background:#222;
  border-radius:6px;
  overflow:hidden;
  text-align:center;
}
.channelBtn img{
  width:100%;
  display:block;
}
.channelCode{
  padding:6px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="playerWrap">
  <div class="videoContainer">
    <video id="video" controls preload="auto" playsinline></video>
  </div>
</div>

<div class="channels">

   <!-- MP4 -->
  <div class="channelBtn"
       data-manifest="https://dn721906.ca.archive.org/0/items/maging-sino-ka-man-full-movie-robin-padilla-sharon-cuneta-you-tube-360p_202405/Maging_Sino_Ka_Man_Full_Movie_Robin_Padilla_%26_Sharon_Cuneta___YouTube%28360p%29.mp4"
       data-type="MP4"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="">
    <div class="channelCode">MP4 SAMPLE1</div>
  </div>

  <!-- MP4 -->
  <div class="channelBtn"
       data-manifest="https://ia600802.us.archive.org/29/items/if-only-lea-salonga-lyrics-720-p-hd/If%20Only%20-%20Lea%20Salonga%20-%20Lyrics%28720P_HD%29.ia.mp4"
       data-type="MP4"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/4NJlK0A.png">
    <div class="channelCode">MP4 SAMPLE</div>
  </div>

  <!-- MPD -->
  <div class="channelBtn"
       data-manifest="https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd"
       data-key="f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd"
       data-type="IPTV"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/fHBIgs6.png">
    <div class="channelCode">MPD SAMPLE</div>
  </div>


  <!-- MP4 -->
  <div class="channelBtn"
       data-manifest="
https://ia802809.us.archive.org/18/items/the-journey-with-lyrics-by-lea-salonga-480-p/Can%20We%20Just%20Stop%20And%20Talk%20Awhile%20by%20Lea%20Salonga%281080P_HD%29.mp4"
       data-type="MP4"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/4NJlK0A.png">
    <div class="channelCode">MP4 SAMPLE</div>
  </div>

  <!-- MPD -->
  <div class="channelBtn"
       data-manifest="https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd"
       data-key="f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd"
       data-type="IPTV"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/fHBIgs6.png">
    <div class="channelCode">MPD SAMPLE</div>
  </div>

  <!-- MP4 -->
  <div class="channelBtn"
       data-manifest="https://ia600802.us.archive.org/29/items/if-only-lea-salonga-lyrics-720-p-hd/If%20Only%20-%20Lea%20Salonga%20-%20Lyrics%28720P_HD%29.ia.mp4"
       data-type="MP4"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/4NJlK0A.png">
    <div class="channelCode">MP4 SAMPLE</div>
  </div>

  <!-- MPD -->
  <div class="channelBtn"
       data-manifest="https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd"
       data-key="f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd"
       data-type="IPTV"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/fHBIgs6.png">
    <div class="channelCode">MPD SAMPLE</div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");
  const buttons = Array.from(document.querySelectorAll(".channelBtn"));
  let currentIndex = -1;

  shaka.polyfill.installAll();

  let shakaPlayer = null;

  async function destroyPlayers(){
    if(shakaPlayer){
      await shakaPlayer.destroy();
      shakaPlayer = null;
    }
    video.removeAttribute("src");
    video.load();
  }

  // MP4 playback
  async function playMP4(url){
    await destroyPlayers();
    video.preload = "auto";
    video.src = url;
    video.load();
    await new Promise(resolve => {
      if(video.readyState >= 3) resolve();
      else video.addEventListener("canplay", resolve, { once:true });
    });
    await video.play();
  }

  // MPD playback
  async function playMPD(url, keyString){
    await destroyPlayers();
    shakaPlayer = new shaka.Player(video);
    if(keyString){
      const p = keyString.split(":");
      if(p.length === 2){
        shakaPlayer.configure({
          drm:{
            clearKeys:{ [p[0].trim()]: p[1].trim() }
          }
        });
      }
    }
    await shakaPlayer.load(url);
    await video.play();
  }

  // PLAY BY INDEX
  async function playByIndex(index){
    if(index < 0 || index >= buttons.length) return;
    currentIndex = index;
    const btn = buttons[index];
    const url  = btn.dataset.manifest;
    const key  = btn.dataset.key || "";
    const post = btn.dataset.poster || "";
    if(post) video.poster = post;

    if(url.endsWith(".mp4") || btn.dataset.type === "MP4"){
      playMP4(url);
    }else if(url.endsWith(".mpd") || btn.dataset.type === "IPTV"){
      playMPD(url,key);
    }
  }

  // Click handler
  buttons.forEach((btn,index) => {
    btn.addEventListener("click", () => playByIndex(index));
  });

  // Auto next + loop
  video.addEventListener("ended", () => {
    const nextIndex = (currentIndex + 1) % buttons.length;
    playByIndex(nextIndex);
  });

  // Start first video automatically
  playByIndex(0);

});
</script>

</body>
</html>
