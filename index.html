<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Player Auto-Loop</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.8/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
}
.playerWrap{
  padding:10px;
  text-align:center;
}
video{
  width:95%;
  max-width:900px;
  background:black;
}
.channels{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
  justify-content:center;
}
.channelBtn{
  width:140px;
  cursor:pointer;
  background:#222;
  border-radius:6px;
  overflow:hidden;
  text-align:center;
}
.channelBtn img{
  width:100%;
  display:block;
}
.channelCode{
  padding:6px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="playerWrap">
<video id="video" controls preload="auto" playsinline></video>
</div>

<div class="channels">

  <!-- MP4 -->
  <div class="channelBtn"
       data-manifest="https://ia600802.us.archive.org/29/items/if-only-lea-salonga-lyrics-720-p-hd/If%20Only%20-%20Lea%20Salonga%20-%20Lyrics%28720P_HD%29.ia.mp4"
       data-type="MP4"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/4NJlK0A.png">
    <div class="channelCode">MP4 SAMPLE</div>
  </div>

  <!-- HLS / M3U8 -->
  <div class="channelBtn"
       data-manifest="https://live20.bozztv.com/giatvplayout7/giatv-208454/playlist.m3u8"
       data-type="HLS"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/4NJlK0A.png">
    <div class="channelCode">HLS SAMPLE</div>
  </div>

  <!-- Shaka / MPD -->
  <div class="channelBtn"
       data-manifest="https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd"
       data-key="f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd"
       data-type="IPTV"
       data-poster="https://wallpaperaccess.com/full/5159563.jpg">
    <img src="https://i.imgur.com/fHBIgs6.png">
    <div class="channelCode">MPD SAMPLE</div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");
  const buttons = Array.from(document.querySelectorAll(".channelBtn"));
  let currentIndex = -1;

  shaka.polyfill.installAll();

  let shakaPlayer = null;
  let hls = null;

  // Destroy previous player
  async function destroyPlayers(){
    if(hls){
      hls.destroy();
      hls = null;
    }
    if(shakaPlayer){
      await shakaPlayer.destroy();
      shakaPlayer = null;
    }
    video.removeAttribute("src");
    video.load();
  }

  // Smooth MP4 playback
  async function playMP4(url){
    await destroyPlayers();
    video.preload = "auto";
    video.src = url;
    video.load();
    await new Promise(resolve => {
      if(video.readyState >= 3) resolve();
      else video.addEventListener("canplay", resolve, { once:true });
    });
    await video.play();
  }

  // Shaka / MPD
  async function playMPD(url, keyString){
    await destroyPlayers();
    shakaPlayer = new shaka.Player(video);
    if(keyString){
      const p = keyString.split(":");
      if(p.length === 2){
        shakaPlayer.configure({
          drm:{
            clearKeys:{ [p[0].trim()]: p[1].trim() }
          }
        });
      }
    }
    await shakaPlayer.load(url);
    await video.play();
  }

  // HLS / M3U8
  async function playM3U8(url){
    await destroyPlayers();
    if(video.canPlayType("application/vnd.apple.mpegurl")){
      video.src = url;
      await video.play();
    }else if(window.Hls && Hls.isSupported()){
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        backBufferLength: 30,
        fragLoadingTimeOut: 20000,
        manifestLoadingTimeOut: 20000,
        levelLoadingTimeOut: 20000
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function(){ video.play(); });
      hls.on(Hls.Events.ERROR, function(event, data){
        console.warn("HLS Error:", data);
      });
    }else{
      alert("HLS not supported");
    }
  }

  // =========================
  // Play by index (auto next)
  // =========================
  async function playByIndex(index){
    if(index < 0 || index >= buttons.length) return;
    currentIndex = index;
    const btn = buttons[index];
    const url  = btn.dataset.manifest;
    const key  = btn.dataset.key || "";
    const post = btn.dataset.poster || "";
    if(post) video.poster = post;

    // Decide which player to use
    if(url.endsWith(".mp4") || btn.dataset.type === "MP4"){
      playMP4(url);
    }else if(url.endsWith(".mpd") || btn.dataset.type === "IPTV"){
      playMPD(url, key);
    }else if(url.endsWith(".m3u8") || btn.dataset.type === "HLS"){
      playM3U8(url);
    }else{
      playMP4(url);
    }
  }

  // Click handler
  buttons.forEach((btn, index) => {
    btn.addEventListener("click", () => playByIndex(index));
  });

  // Auto next
  video.addEventListener("ended", () => {
    const nextIndex = currentIndex + 1;
    if(nextIndex >= buttons.length) currentIndex = -1; // loop
    playByIndex((currentIndex + 1) % buttons.length);
  });

  // Start first video automatically
  playByIndex(0);

});
</script>

</body>
</html>
