<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.8/shaka-player.compiled.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:black;
  overflow:hidden;
}
video{
  width:100%;
  height:100%;
  object-fit: fill; /* stretch video to fill screen */
  background:black;
}

/* TITLE OVERLAY */
#titleOverlay{
  position:absolute;
  top:30px;   /* adjust vertical position */
  left:50px;  /* adjust horizontal position */
  
  color:#fff;
  font-family: Arial, sans-serif;
  font-size:10px;  /* adjust font size */
  padding: 10px 16px;  /* adjust padding around text */
  border-radius: 8px;
  z-index: 10;
}

  #secondText{
  position:absolute;

  bottom:50px;   /* adjust mo pwesto (ibaba) */
  right:70px;     /* adjust mo pwesto (kaliwa) */


  color:#fff;

  font-family: Arial, sans-serif;
  font-size: 24px;   /* 👉 LAKI / LIIT ng text */
  padding: 8px 14px;
  border-radius: 6px;

  z-index:10;
}

  #logo1{
  position:absolute;

  top:50px;      /* pwesto */
  right:70px;

  width:80px;    /* laki ng logo */
  height:auto;

  z-index:10;
  pointer-events:none;
}

#logo2{
  position:absolute;

  top:20px;      /* pwesto */
  left:20px;

  width:80px;    /* laki ng logo */
  height:auto;

  z-index:10;
  pointer-events:none;
}


</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<div id="titleOverlay"></div>
<div id="secondText">SECOND TEXT</div>

<img id="logo1" src="https://i.imgur.com/wo8vkU8.png">
<img id="logo2" src="logo2.png">
  <script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");
  const titleOverlay = document.getElementById("titleOverlay");
  const secondText = document.getElementById("secondText");
  const logo1 = document.getElementById("logo1");
  const logo2 = document.getElementById("logo2");

  // Playlist
  const playlist = [
      {
      type: "MP4",
      manifest: "https://ia600802.us.archive.org/29/items/if-only-lea-salonga-lyrics-720-p-hd/If%20Only%20-%20Lea%20Salonga%20-%20Lyrics%28720P_HD%29.ia.mp4"
    
    },
    {
      type: "MP4",
      manifest: "https://ia600802.us.archive.org/29/items/if-only-lea-salonga-lyrics-720-p-hd/If%20Only%20-%20Lea%20Salonga%20-%20Lyrics%28720P_HD%29.ia.mp4",
      title: "MP4 Sample 1",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/wo8vkU8.png",
      logo2: "https://i.imgur.com/logo2.png"
    },
    {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd",
      key: "f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd",
      title: "MPD Sample - OroPlatamata"
    }
  ];

  let currentIndex = 0;
  shaka.polyfill.installAll();
  let shakaPlayer = null;

  async function destroyPlayers(){
    if(shakaPlayer){
      await shakaPlayer.destroy();
      shakaPlayer = null;
    }
    video.removeAttribute("src");
    video.load();
  }

  function updateOverlays(item){
    titleOverlay.textContent = item.title || "";
    secondText.textContent = item.secondText || "";
    secondText.style.display = item.secondText ? "block" : "none";

    logo1.src = item.logo1 || "";
    logo1.style.display = item.logo1 ? "block" : "none";

    logo2.src = item.logo2 || "";
    logo2.style.display = item.logo2 ? "block" : "none";
  }

  async function playMP4(url, item){
    updateOverlays(item);
    await destroyPlayers();
    video.src = url;
    video.load();
    try { await video.play(); } 
    catch(e){ video.addEventListener("click", () => video.play(), { once:true }); }
  }

  async function playMPD(url, keyString, item){
    updateOverlays(item);
    await destroyPlayers();
    shakaPlayer = new shaka.Player(video);
    if(keyString){
      const [k1, k2] = keyString.split(":");
      shakaPlayer.configure({ drm:{ clearKeys:{[k1.trim()]: k2.trim()} } });
    }
    try { await shakaPlayer.load(url); await video.play(); } 
    catch(e){ video.addEventListener("click", () => video.play(), { once:true }); }
  }

  async function playNext(){
    const item = playlist[currentIndex];

    if(item.type === "MP4"){
      await playMP4(item.manifest, item);
    } else if(item.type === "IPTV"){
      await playMPD(item.manifest, item.key, item);
    }

    video.onended = () => {
      currentIndex = (currentIndex + 1) % playlist.length;
      playNext();
    };
  }

  // Start playlist autoplay
  playNext();

  // Optional: Fullscreen automatically
  video.requestFullscreen?.();

});
</script>
</body>
</html>
