  #marqueeText{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  overflow:hidden;

 background:blue; /* background color */

  font-family:Arial;

  z-index:15;

#marqueeContent{
  display:inline-block;
  padding-left:100%;

@keyframes scrollText{
  from{ transform:translateX(0); }

  font-family:Arial;
  font-size:18px;

  padding:10px 12px;
  border-radius:4px;

  z-index:15;

  async function destroyPlayers(){
    if(shakaPlayer){

    marqueeContent.textContent = item.marquee || "";
marqueeText.style.display = item.marquee ? "block" : "none";


 
  }


 

  
 async function playMP4(url, item){
  updateOverlays(item);
  await destroyPlayers();
  video.src = url;

video.type = "video/mp4";
  video.load();

  // Retry mechanism kung may error sa video
  let retryTimeout;
  function retryPlay(){
    retryTimeout = setTimeout(async () => {
      try {
        await video.play();

        const savedTime = localStorage.getItem(resumeKey);
if(savedTime){
  video.currentTime = savedTime;
}
      } catch(e){
        retryPlay();
      }
    }, 3000);
  }

  video.onerror = () => {
    console.log("Video error, retrying in 3s...");
    retryPlay();
  };

  try { await video.play();  const savedTime = localStorage.getItem(resumeKey);
if(savedTime){
  video.currentTime = savedTime;
}
   } 
  catch(e){ retryPlay(); }
}

async function playMPD(url, keyString, item){
  updateOverlays(item);
  await destroyPlayers();
  shakaPlayer = new shaka.Player(video);

  if(keyString){
    const [k1, k2] = keyString.split(":");
    shakaPlayer.configure({ drm:{ clearKeys:{[k1.trim()]: k2.trim()} } });
  }

  // Retry on Shaka network error
  shakaPlayer.addEventListener('error', (event) => {
    const shakaError = event.detail;
    console.warn("Shaka Player error, retrying in 3s...", shakaError);
    setTimeout(async () => {
    try { 
  await shakaPlayer.load(url); 
  await video.play();

  const savedTime = localStorage.getItem(resumeKey);
  if(savedTime){
    video.currentTime = savedTime;
  }

} catch(e){ 
  console.log("Autoplay failed, will retry.", e); 
}
    }, 3000);
  });

 try { 
  await shakaPlayer.load(url); 
  await video.play();

  const savedTime = localStorage.getItem(resumeKey);
  if(savedTime){
    video.currentTime = savedTime;
  }

} catch(e){ 
  console.log("Autoplay failed, will retry.", e); 
}

}
async function playNext(){
  const item = playlist[currentIndex];

  if(item.type === "MP4"){
    await playMP4(item.manifest, item);
  } else if(item.type === "IPTV"){
    await playMPD(item.manifest, item.key, item);
  }

  video.onended = () => {
    currentIndex = (currentIndex + 1) % playlist.length;
    playNext();
  };
}
 
  
  
  // AUTO RESUME kapag nawalan ng internet
window.addEventListener("online", () => {
  console.log("Internet restored, resuming playback...");
  playNext();
});

// Kapag nag buffering o huminto ang video
video.addEventListener("stalled", () => {
  console.log("Video stalled, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});
  
video.addEventListener("timeupdate", () => {
  localStorage.setItem(resumeKey, video.currentTime);
});
  
video.addEventListener("waiting", () => {
  console.log("Buffering detected, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});
  
  
  // INTERNET WATCHDOG
let internetTimer = null;

// kapag nawalan internet
window.addEventListener("offline", () => {
  console.log("Internet lost");

  internetTimer = setTimeout(() => {
    console.log("No internet for 30s, refreshing page...");
    location.reload();
  }, 30000); // 30 seconds
});

// kapag bumalik internet
window.addEventListener("online", () => {
  console.log("Internet restored");

  if(internetTimer){
    clearTimeout(internetTimer);
    internetTimer = null;
  }

  playNext(); // resume playlist
});

// retry kapag buffering
video.addEventListener("stalled", () => {
  console.log("Video stalled, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});

video.addEventListener("waiting", () => {
  console.log("Buffering detected, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});


  // Start playlist autoplay
  playNext();
buildPlaylistUI();
  let playlistVisible = true;

video.addEventListener("click", () => {

  if(playlistVisible){
    playlistPanel.style.display = "none";
    playlistVisible = false;
  }else{
    playlistPanel.style.display = "block";
    playlistVisible = true;
  }

});
  // Optional: Fullscreen automatically
  video.requestFullscreen?.();

});

 function updateClock(){

  const now = new Date();

  let hours = now.getHours();
  let minutes = now.getMinutes();

  let ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  hours = hours ? hours : 12;

  minutes = String(minutes).padStart(2,"0");

  clockTime.textContent = hours + ":" + minutes + " " + ampm;

}

setInterval(updateClock,60000);
updateClock();
