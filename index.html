<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.8/shaka-player.compiled.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:black;
  overflow:hidden;
}
video{
  width:100%;
  height:100%;
  object-fit: fill; /* stretch video to fill screen */
  background:black;
}

/* TITLE OVERLAY */
#titleOverlay{
  position:absolute;
  top:30px;   /* adjust vertical position */
  left:50px;  /* adjust horizontal position */
  
  color:#fff;
  font-family: Arial, sans-serif;
  font-size:17px;  /* adjust font size */
  padding: 10px 16px;  /* adjust padding around text */
  border-radius: 8px;
  z-index: 10;
}

  #secondText{
  position:absolute;

  bottom:50px;   /* adjust mo pwesto (ibaba) */
  right:50px;     /* adjust mo pwesto (kaliwa) */


  color:#fff;

  font-family: Arial, sans-serif;
  font-size: 20px;   /* 👉 LAKI / LIIT ng text */
  padding: 8px 14px;
  border-radius: 6px;

  z-index:10;
}

    #secondText2{
  position:absolute;

  bottom:50px;   /* adjust mo pwesto (ibaba) */
  left:50px;     /* adjust mo pwesto (kaliwa) */


  color:#fff;

  font-family: Arial, sans-serif;
  font-size: 16px;   /* 👉 LAKI / LIIT ng text */
  padding: 8px 14px;
  border-radius: 6px;

  z-index:10;
}

  #logo1{
  position:absolute;

  top:10px;      /* pwesto */
  right:50px;

  width:130px;    /* laki ng logo */
  height:110px;

  z-index:10;
  pointer-events:none;
}

#logo2{
  position:absolute;

  top:20px;      /* pwesto */
  left:20px;

  width:80px;    /* laki ng logo */
  height:auto;

  z-index:10;
  pointer-events:none;
}

#playlistPanel{
  position:absolute;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.75);
  overflow-y:auto;
  z-index:20;
  padding-top:20px;
}

.playItem{
  padding:12px 15px;
  color:#fff;
  font-family:Arial;
  font-size:15px;
  border-bottom:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
}

.playItem:hover{
  background:rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<div id="playlistPanel"></div>
<div id="titleOverlay"></div>
<div id="secondText"></div>
  <div id="secondText2"></div>
<img id="logo1" >
<img id="logo2" >

  <script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");
  const titleOverlay = document.getElementById("titleOverlay");
  const secondText = document.getElementById("secondText");
   const secondText2 = document.getElementById("secondText2");
  const logo1 = document.getElementById("logo1");
  const logo2 = document.getElementById("logo2");

  const playlistPanel = document.getElementById("playlistPanel");

function buildPlaylistUI(){
  playlistPanel.innerHTML = "";

  playlist.forEach((item,index)=>{
    const div = document.createElement("div");
    div.className = "playItem";
    div.textContent = item.title;

   div.onclick = async () => {

  currentIndex = index;

  if(item.type === "MP4"){
    await playMP4(item.manifest,item);
  }else if(item.type === "IPTV"){
    await playMPD(item.manifest,item.key,item);
  }

  // hide playlist after clicking
  playlistPanel.style.display = "none";

};

    playlistPanel.appendChild(div);
  });
}
  // Playlist
  const playlist = [


 {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd",
      key: "f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd",
      title: "Oro Plata mata",
      secondText: "Parental Guidance",
   secondText2: "TEST BROADCAST",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
   {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/bridalshower/98dc889b-734f-4abf-9268-971b5d681588/manifest.mpd",
      key: "25c3a7c0bd954e6d8c9dfc786f5966e9:c63b3f1c1f8e7645494f81097334dfa3",
      title: "Bridal Shower",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
  {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/thethirdparty/574be032-d8bd-481c-8c3f-1d670f7f5b75/manifest.mpd",
      key: "c5823409026a4d02bde849985dfdac73:363e490749a82b17ec3d70beb4be023e",
      title: "The Third Party",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
   {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/dubai/a5112556-0d69-45a9-a86c-23511b61e074/manifest-1.mpd",
      key: "b25cee6f46044542b3a8ce229af406c5:fb35c65c13beefa78bc6052eed929777",
      title: "Dubai",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
 {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/weddingtayoweddinghindi/1aaa443d-4fde-44ce-8aaa-6ded9bd2dab8/manifest.mpd",
      key: "c52cad973edb4e688edfcd0422c79e0a:aa24888e81478e33368ec9651d0c12ed",
      title: "Wedding Tayo, Wedding Hindi",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
   {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/waybackhome/d935a439-126a-4a93-b261-8ddbc66d6870/manifest.mpd",
      key: "dda443aa18ef43639cba561c56172e72:644b628c1b20b10b96a08cf024d4c435",
      title: "Way Back Home",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
  {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/thehowsofus/1fc7bf3e-bacc-4d32-baee-fc254685ceaa/manifest.mpd",
      key: "20ac1b672f3246a791bb260481cd95dc:10b64806acceec6f7b5245ff063a4ef2",
      title: "The Hows of Us",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    },
   {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/watchlist2019/7f973ff4-8885-40d3-9d0b-d14ae40015f2/manifest.mpd",
      key: "416be350a1414745b4264cf15532863c:6911cf448559b8625484e270884217a1",
      title: "Watch List",
      secondText: "Parental Guidance",
      logo1: "https://i.imgur.com/tRyRFmM.png"
    }

    
  
  
  ];

  let currentIndex = 0;
  shaka.polyfill.installAll();
  let shakaPlayer = null;

  async function destroyPlayers(){
    if(shakaPlayer){
      await shakaPlayer.destroy();
      shakaPlayer = null;
    }
    video.removeAttribute("src");
    video.load();
  }

  function updateOverlays(item){
    titleOverlay.textContent = item.title || "";
    secondText.textContent = item.secondText || "";
    secondText.style.display = item.secondText ? "block" : "none";
    secondText2.textContent = item.secondText2 || "";
    secondText2.style.display = item.secondText2 ? "block" : "none";


    logo1.src = item.logo1 || "";
    logo1.style.display = item.logo1 ? "block" : "none";

    logo2.src = item.logo2 || "";
    logo2.style.display = item.logo2 ? "block" : "none";
  }

 async function playMP4(url, item){
  updateOverlays(item);
  await destroyPlayers();
  video.src = url;
  video.load();

  // Retry mechanism kung may error sa video
  let retryTimeout;
  function retryPlay(){
    retryTimeout = setTimeout(async () => {
      try {
        await video.play();
      } catch(e){
        retryPlay();
      }
    }, 3000);
  }

  video.onerror = () => {
    console.log("Video error, retrying in 3s...");
    retryPlay();
  };

  try { await video.play(); } 
  catch(e){ retryPlay(); }
}

async function playMPD(url, keyString, item){
  updateOverlays(item);
  await destroyPlayers();
  shakaPlayer = new shaka.Player(video);

  if(keyString){
    const [k1, k2] = keyString.split(":");
    shakaPlayer.configure({ drm:{ clearKeys:{[k1.trim()]: k2.trim()} } });
  }

  // Retry on Shaka network error
  shakaPlayer.addEventListener('error', (event) => {
    const shakaError = event.detail;
    console.warn("Shaka Player error, retrying in 3s...", shakaError);
    setTimeout(async () => {
      try { await shakaPlayer.load(url); await video.play(); } 
      catch(e){ console.log("Retry failed, will retry again.", e); }
    }, 3000);
  });

  try { await shakaPlayer.load(url); await video.play(); } 
  catch(e){ console.log("Autoplay failed, will retry.", e); }
}

async function playNext(){
  const item = playlist[currentIndex];

  if(item.type === "MP4"){
    await playMP4(item.manifest, item);
  } else if(item.type === "IPTV"){
    await playMPD(item.manifest, item.key, item);
  }

  video.onended = () => {
    currentIndex = (currentIndex + 1) % playlist.length;
    playNext();
  };
}
 
  
  
  // AUTO RESUME kapag nawalan ng internet
window.addEventListener("online", () => {
  console.log("Internet restored, resuming playback...");
  playNext();
});

// Kapag nag buffering o huminto ang video
video.addEventListener("stalled", () => {
  console.log("Video stalled, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});

video.addEventListener("waiting", () => {
  console.log("Buffering detected, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});
  
  
  // INTERNET WATCHDOG
let internetTimer = null;

// kapag nawalan internet
window.addEventListener("offline", () => {
  console.log("Internet lost");

  internetTimer = setTimeout(() => {
    console.log("No internet for 30s, refreshing page...");
    location.reload();
  }, 30000); // 30 seconds
});

// kapag bumalik internet
window.addEventListener("online", () => {
  console.log("Internet restored");

  if(internetTimer){
    clearTimeout(internetTimer);
    internetTimer = null;
  }

  playNext(); // resume playlist
});

// retry kapag buffering
video.addEventListener("stalled", () => {
  console.log("Video stalled, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});

video.addEventListener("waiting", () => {
  console.log("Buffering detected, retrying...");
  setTimeout(() => {
    video.play().catch(()=>{});
  }, 3000);
});

// Start playlist autoplay
playNext();
  // Start playlist autoplay
  playNext();
buildPlaylistUI();
  // Optional: Fullscreen automatically
  video.requestFullscreen?.();

});
    video.addEventListener("click", () => {
  playlistPanel.style.display = "block";
});
</script>
</body>
</html>
