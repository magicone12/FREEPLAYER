<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Fullscreen 16:9 Autoplay with Sound</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.8/shaka-player.compiled.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:black;
  overflow:hidden;
}
video{
  width:100%;
  height:100%;
  object-fit: fill; /* stretch to fill screen */
  background:black;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.getElementById("video");

  const playlist = [
     {
      type: "MP4",
      manifest: "https://dn721906.ca.archive.org/0/items/maging-sino-ka-man-full-movie-robin-padilla-sharon-cuneta-you-tube-360p_202405/Maging_Sino_Ka_Man_Full_Movie_Robin_Padilla_%26_Sharon_Cuneta___YouTube%28360p%29.mp4"
    },
    {
      type: "MP4",
      manifest: "https://ia600802.us.archive.org/29/items/if-only-lea-salonga-lyrics-720-p-hd/If%20Only%20-%20Lea%20Salonga%20-%20Lyrics%28720P_HD%29.ia.mp4"
    },
    {
      type: "IPTV",
      manifest: "https://iwant-video.akamaized.net/oroplatamata/8c243b88-5298-451d-818d-18c037fdf1e1/manifest.mpd",
      key: "f811228bb456420e853364c8e884e3e9:3beff922390acae0b69151022a7846cd"
    }
  ];

  let currentIndex = 0;
  shaka.polyfill.installAll();
  let shakaPlayer = null;

  async function destroyPlayers(){
    if(shakaPlayer){
      await shakaPlayer.destroy();
      shakaPlayer = null;
    }
    video.removeAttribute("src");
    video.load();
  }

  async function playMP4(url){
    await destroyPlayers();
    video.src = url;
    video.load();
    try {
      await video.play();
    } catch(e){
      console.log("Autoplay with sound blocked. Tap screen to start.");
      video.addEventListener("click", () => video.play(), { once:true });
    }
  }

  async function playMPD(url, keyString){
    await destroyPlayers();
    shakaPlayer = new shaka.Player(video);
    if(keyString){
      const p = keyString.split(":");
      if(p.length === 2){
        shakaPlayer.configure({
          drm:{ clearKeys:{ [p[0].trim()]: p[1].trim() } }
        });
      }
    }
    try {
      await shakaPlayer.load(url);
      await video.play();
    } catch(e){
      console.log("Autoplay with sound blocked. Tap screen to start.");
      video.addEventListener("click", () => video.play(), { once:true });
    }
  }

  async function playCurrent(){
    const item = playlist[currentIndex];
    if(item.type === "MP4"){
      playMP4(item.manifest);
    } else if(item.type === "IPTV"){
      playMPD(item.manifest, item.key);
    }
  }

  video.addEventListener("ended", () => {
    currentIndex = (currentIndex + 1) % playlist.length;
    playCurrent();
  });

  // Start first video
  playCurrent();

  // Optional: fullscreen automatically
  video.requestFullscreen?.();

});
</script>

</body>
</html>
